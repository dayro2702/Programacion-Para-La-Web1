<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panaderia</title>
  <link rel="stylesheet" href="cafeteria.css">
</head>
<body>
  <h1>PANADERIA</h1>

  <section class="productos">
    <article class="producto" data-nombre="Café" data-precio="3000">
      <img src="img/cafe.jpg" alt="Café">
      <h3>Café</h3>
      <p>$ 3000</p>
      <button>Comprar</button> 
    </article>
    <article class="producto" data-nombre="Pan" data-precio="4000">
      <img src="img/pan.jpg" alt="Pan">
      <h3>Pan</h3>
      <p>$ 4000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Chocolate" data-precio="5000">
      <img src="./img/chocolate.jpg" alt="Chocolate">
      <h3>Chocolate</h3>
      <p>$ 5000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Postre" data-precio="7000">
      <img src="./img/postre.jpg" alt="Postre">
      <h3>Postre</h3>
      <p>$ 7000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Galletas" data-precio="2000">
      <img src="./img/galletas.jpg" alt="Galletas">
      <h3>Galletas</h3>
      <p>$ 2000</p>
      <button>Comprar</button>
    </article>
    
    <article class="producto" data-nombre="Empanadas" data-precio="3500">
      <img src="./img/empanadas.jpg" alt="Empanadas">
      <h3>Empanadas</h3>
      <p>$ 3500</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Milhoja" data-precio="5500">
      <img src="./img/milhoja.jpg" alt="Milhoja">
      <h3>Milhoja</h3>
      <p>$ 5500</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Buñuelos" data-precio="3000">
      <img src="./img/buñuelos.jpg" alt="Buñuelos">
      <h3>Buñuelos</h3>
      <p>$ 3000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Gaseosa" data-precio="2500">
      <img src="./img/gaseosa.jpg" alt="Gaseosa">
      <h3>Gaseosa</h3>
      <p>$ 2500</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Agua" data-precio="1700">
      <img src="./img/agua.jpg" alt="Agua">
      <h3>Agua</h3>
      <p>$ 1700</p>
      <button>Comprar</button>
    </article>
  </section>

  <section class="carrito">
    <h2>Carrito de compras</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Item</th>
          <th>Cantidad</th>
          <th>Acción</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="5">Carrito vacío - comience a comprar!</td>
        </tr>
      </tbody>
    </table>
    <h3 id="totalGeneral">Total: $0</h3>
  </section>
  <script src="./cafeteria.js"></script>
</body>
</html>
