<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Parqueadero</title>
    <link rel="stylesheet" href="parqueadero.css">
</head>
<body>

    <header>
        <h1>Sistema de Control de Parqueadero</h1>
        <p><strong>ESTUDIANTE: </strong>Dayro Henao</p>
    </header>

    <main>

        <section class="formulario">
            <h2>Registro del Vehículo</h2>

            <label>Tipo de Vehículo</label>
            <select id="tipoVehiculo">
                <option value="">Seleccione</option>
                <option value="Automovil">Automóvil</option>
                <option value="Moto">Moto</option>
            </select>

            <label>Placa</label>
            <input type="text" id="placa">

            <label>Fecha y Hora de Ingreso</label>
            <input type="datetime-local" id="ingreso">

            <label>Fecha y Hora de Salida</label>
            <input type="datetime-local" id="salida">

            <button onclick="calcularPago()">Calcular Pago</button>
        </section>

        <section class="resultado">
            <h2>Resultado</h2>

            <div id="resultado"></div>

            <hr>

            <label>Dinero Recibido</label>
            <input type="number" id="dinero">

            <button onclick="generarCambio()">Generar Cambio</button>

            <div id="cambio"></div>
        </section>
        <footer>
            <p>&copy; 2026 CESDE Todos los derechos reservados.</p> <!--&copy; (Para que aparezca el simbolo de copy right)-->
        </footer>
    </main>

    <script src="parqueadero.js"></script>

</body>
</html>
